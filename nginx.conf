map $http_accept $is_markdown_agent {
    default       0;
    "~*text/markdown" 1;
}

map $uri $md_docs_path {
    default       $uri;
    /             /overview;
    /index.html   /overview;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Agent Discovery — RFC 8288 Link headers
    add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
    add_header Link "</.well-known/agent-skills/index.json>; rel=\"describedby\"; title=\"Agent Skills\"" always;
    add_header Link "</.well-known/mcp/server-card.json>; rel=\"describedby\"; title=\"MCP Server\"" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static assets with content hashes — long cache, return proper 404 if missing
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Agent Discovery — explicit content-type for extensionless .well-known files
    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        try_files $uri =404;
    }
    location = /.well-known/oauth-authorization-server {
        default_type application/json;
        try_files $uri =404;
    }
    location = /.well-known/oauth-protected-resource {
        default_type application/json;
        try_files $uri =404;
    }

    # Unmatched .well-known paths → 404 (not SPA fallback)
    location ~ ^/\.well-known/ {
        try_files $uri =404;
    }

    # SPA fallback — unmatched paths return 404 with SPA shell (not 200 OK)
    location / {
        if ($is_markdown_agent) {
            add_header Content-Type text/markdown;
            try_files /markdown$md_docs_path.md $uri =404;
            break;
        }
        try_files $uri $uri/ =404;
        error_page 404 =404 /index.html;
    }
}
