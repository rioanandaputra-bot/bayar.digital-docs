map $http_accept $is_markdown_agent {
    default       0;
    "~*text/markdown" 1;
}

map $uri $md_docs_path {
    default       $uri;
    /             /overview;
    /index.html   /overview;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
    add_header Link "</.well-known/agent-skills/index.json>; rel=\"describedby\"; title=\"Agent Skills\"" always;
    add_header Link "</.well-known/mcp/server-card.json>; rel=\"describedby\"; title=\"MCP Server\"" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        try_files $uri =404;
    }

    location = /.well-known/oauth-authorization-server {
        default_type application/json;
        try_files $uri =404;
    }

    location = /.well-known/oauth-protected-resource {
        default_type application/json;
        try_files $uri =404;
    }

    location ~ ^/\.well-known/ {
        try_files $uri =404;
    }

    location / {
        set $md_path $md_docs_path;

        if ($is_markdown_agent) {
            return 418;
        }
        try_files $uri $uri/ =404;
        error_page 404 =404 /index.html;
    }

    error_page 418 = @md_agent;
    location @md_agent {
        internal;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</.well-known/agent-skills/index.json>; rel=\"describedby\"; title=\"Agent Skills\"" always;
        add_header Link "</.well-known/mcp/server-card.json>; rel=\"describedby\"; title=\"MCP Server\"" always;
        add_header Content-Type "text/markdown; charset=utf-8";
        add_header x-markdown-tokens "0";

        try_files /markdown$md_path.md =404;
    }
}